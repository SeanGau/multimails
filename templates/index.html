<!DOCTYPE html>
<html lang="zh-hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multimails</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;400;700&amp;family=Noto+Serif+TC:wght@200;400;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <style>
        html,
        body {
            height: 100%;
            background-color: darkcyan;
        }

        .form-label {
            font-weight: bold;
            color: white;
        }

        .github-corner:hover .octo-arm {
            animation: octocat-wave 560ms ease-in-out;
        }

        @keyframes octocat-wave {

            0%,
            100% {
                transform: rotate(0)
            }

            20%,
            60% {
                transform: rotate(-25deg)
            }

            40%,
            80% {
                transform: rotate(10deg)
            }
        }

        @media (max-width: 500px) {
            .github-corner:hover .octo-arm {
                animation: none;
            }

            .github-corner .octo-arm {
                animation: octocat-wave 560ms ease-in-out;
            }
        }
    </style>
</head>

<body>
    <!-- Add GitHub Corner -->
    <a href="https://github.com/SeanGau/multimails" target="_blank" class="github-corner"
        aria-label="View source on GitHub">
        <svg width="80" height="80" viewBox="0 0 250 250"
            style="fill:#151513; color:#fff; position: absolute; top: 0; border: 0; right: 0;" aria-hidden="true">
            <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
            <path
                d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
                fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
            <path
                d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
                fill="currentColor" class="octo-body"></path>
        </svg>
    </a>
    <div class="container d-flex flex-column py-5">
        <div class="row w-100 align-items-center justify-content-center">
            <form class="col-md-6" id="main-form" method="post" action="/" enctype="multipart/form-data">
                {% if preset_token %}<input type="hidden" name="preset_token" value="{{ preset_token }}">{% endif %}
                <label for="from" class="form-label">寄件者</label>
                <input class="form-control mb-3" type="text" name="from" id="input-from" placeholder="your@email.com"
                    value="{{ preset.from }}" required>
                <label for="reply_to" class="form-label">Reply-To（選填）</label>
                <input class="form-control mb-3" type="text" name="reply_to" id="input-reply-to"
                    placeholder="reply@email.com (optional)" value="{{ preset.reply_to }}">
                <label for="smtp_server" class="form-label">SMTP Server（例：smtp.gmail.com, smtp.office365.com）</label>
                <input class="form-control mb-3" type="text" name="smtp_server" id="input-smtp-server"
                    placeholder="smtp.gmail.com" value="{{ preset.smtp_server }}" required>
                <label for="smtp_port" class="form-label">SMTP Port（例：587 for TLS, 465 for SSL）</label>
                <input class="form-control mb-3" type="number" name="smtp_port" id="input-smtp-port"
                    value="{{ preset.smtp_port }}" required>
                <div class="form-check mb-3 text-white">
                    <input class="form-check-input" type="checkbox" name="smtp_use_tls" id="input-smtp-tls"
                        {% if preset.smtp_use_tls %}checked{% endif %}>
                    <label class="form-check-label" for="input-smtp-tls">使用 TLS/SSL</label>
                </div>
                <label for="email" class="form-label">Email / Username</label>
                <input class="form-control mb-3" type="text" name="email" id="input-email" placeholder="your@email.com"
                    required>
                <label for="apppw" class="form-label">Password</label>
                <input class="form-control mb-3" type="password" name="apppw" id="input-apppw" placeholder="***********"
                    required>
                <label for="template" class="form-label">template（支援Markdown語法，變數前面需加上「$」）</label>
                <textarea class="form-control mb-3" name="template" id="input-template" required>{{ preset.template }}</textarea>
                <label for="files" class="form-label">csv（必要欄位：email、subject）</label>
                <input type="file" class="form-control mb-3" name="csv" id="input-csv" accept=".csv" required>
                <label for="files" class="form-label">附件（目前限制pdf，請在csv檔中加上「attachment」欄並對應檔名）</label>
                <input type="file" class="form-control mb-3" multiple="multiple" name="files[]" id="input-files"
                    accept=".pdf">
                <hr>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning">submit</button>
                    <button type="button" class="btn btn-light" id="save-preset-btn">儲存設定並產生分享連結</button>
                </div>
                <div id="preset-link" class="alert alert-success mt-3 d-none" role="alert">
                    分享連結（不含密碼與檔案）：
                    <a id="preset-link-url" href="#" target="_blank"></a>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('save-preset-btn').addEventListener('click', async function () {
            const form = document.getElementById('main-form');
            const formData = new FormData();
            // Only include preset-eligible fields (exclude password, username, csv, attachments)
            const fields = ['from', 'reply_to', 'smtp_server', 'smtp_port', 'template'];
            fields.forEach(name => {
                const el = form.querySelector(`[name="${name}"]`);
                if (el) formData.append(name, el.value);
            });
            const tlsEl = form.querySelector('[name="smtp_use_tls"]');
            if (tlsEl && tlsEl.checked) formData.append('smtp_use_tls', 'on');

            try {
                const res = await fetch('/preset/save', { method: 'POST', body: formData });
                if (!res.ok) throw new Error('save failed');
                const data = await res.json();
                const box = document.getElementById('preset-link');
                const link = document.getElementById('preset-link-url');
                link.href = data.url;
                link.textContent = data.url;
                box.classList.remove('d-none');
            } catch (err) {
                alert('儲存失敗：' + err.message);
            }
        });
    </script>
    <script src="https://kit.fontawesome.com/cc94f52acd.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
</body>

</html>
