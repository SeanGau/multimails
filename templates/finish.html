<!DOCTYPE html>
<html lang="zh-hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multimails</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;400;700&amp;family=Noto+Serif+TC:wght@200;400;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <style>
        html,
        body {
            min-height: 100%;
            background-color: darkcyan;
            color: white;
        }

        .list-scroll {
            max-height: 50vh;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.15);
            border-radius: .25rem;
            padding: .5rem .75rem;
        }

        .list-scroll ul {
            margin: 0;
            padding-left: 1.25rem;
        }

        .progress {
            background-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h1 id="status-title" class="mb-0">Sending…</h1>
            <span id="status-badge" class="badge bg-warning text-dark">in progress</span>
        </div>

        <div class="mb-2">
            <span id="done-count">0</span> / <span id="total-count">{{ total }}</span>
            &nbsp;·&nbsp; success: <span id="success-count">0</span>
            &nbsp;·&nbsp; error: <span id="error-count">0</span>
            <span id="pause-note" class="ms-2 text-warning d-none"></span>
        </div>
        <div class="progress mb-4" style="height: 8px;">
            <div id="progress-bar" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <h2 class="h5">Success</h2>
                <div class="list-scroll">
                    <ul id="success-list"></ul>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <h2 class="h5">Error</h2>
                <div class="list-scroll">
                    <ul id="error-list"></ul>
                </div>
            </div>
        </div>

        <hr>
        <div class="d-grid">
            <a href="{% if preset_token %}/p/{{ preset_token }}{% else %}/{% endif %}" role="button" class="btn btn-warning">回前頁</a>
        </div>
    </div>

    <script>
        (function () {
            const total = parseInt(document.getElementById('total-count').textContent, 10) || 0;
            const successList = document.getElementById('success-list');
            const errorList = document.getElementById('error-list');
            const successCount = document.getElementById('success-count');
            const errorCount = document.getElementById('error-count');
            const doneCount = document.getElementById('done-count');
            const progressBar = document.getElementById('progress-bar');
            const statusTitle = document.getElementById('status-title');
            const statusBadge = document.getElementById('status-badge');
            const pauseNote = document.getElementById('pause-note');

            let succ = 0, errs = 0;
            let lastEventId = null;
            let retryCount = 0;
            let retryTimer = null;
            let finished = false;
            let es = null;
            const MAX_RETRIES = 8;
            const BADGE_CLASSES = ['bg-warning', 'text-dark', 'bg-success', 'bg-danger', 'bg-info'];

            function setBadge(text, ...cls) {
                statusBadge.textContent = text;
                BADGE_CLASSES.forEach(c => statusBadge.classList.remove(c));
                cls.forEach(c => statusBadge.classList.add(c));
            }

            function updateProgress() {
                const done = succ + errs;
                doneCount.textContent = done;
                if (total > 0) {
                    progressBar.style.width = Math.min(100, (done / total) * 100) + '%';
                }
            }

            function describe(d) {
                const recv = d.recevier || '?';
                const subj = d.subject || '?';
                return `${recv} — ${subj}` + (d.error ? ` (${d.error})` : '');
            }

            function streamUrl() {
                const base = '/stream/{{ job_id }}';
                return lastEventId !== null ? `${base}?lastEventId=${encodeURIComponent(lastEventId)}` : base;
            }

            function connect() {
                if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
                if (es) { try { es.close(); } catch (_) {} }
                es = new EventSource(streamUrl());

                es.onopen = function () {
                    retryCount = 0;
                    if (!finished) setBadge('in progress', 'bg-warning', 'text-dark');
                };

                es.onmessage = function (e) {
                    if (e.lastEventId) lastEventId = e.lastEventId;
                    let d;
                    try { d = JSON.parse(e.data); } catch { return; }
                    if (d.type === 'success') {
                        succ++;
                        successCount.textContent = succ;
                        const li = document.createElement('li');
                        li.textContent = describe(d);
                        successList.appendChild(li);
                        updateProgress();
                    } else if (d.type === 'error') {
                        errs++;
                        errorCount.textContent = errs;
                        const li = document.createElement('li');
                        li.textContent = describe(d);
                        errorList.appendChild(li);
                        updateProgress();
                    } else if (d.type === 'pause') {
                        pauseNote.textContent = `（批次冷卻 ${d.seconds}s）`;
                        pauseNote.classList.remove('d-none');
                        setTimeout(() => pauseNote.classList.add('d-none'), (d.seconds || 0) * 1000);
                    } else if (d.type === 'done') {
                        finished = true;
                        es.close();
                        statusTitle.textContent = 'Done';
                        setBadge('finished', 'bg-success');
                        progressBar.style.width = '100%';
                    }
                };

                es.onerror = function () {
                    if (finished) return;
                    if (es && es.readyState === EventSource.CONNECTING) {
                        setBadge('reconnecting…', 'bg-info');
                        return;
                    }
                    retryCount++;
                    if (retryCount > MAX_RETRIES) {
                        setBadge('connection lost', 'bg-danger');
                        return;
                    }
                    const delay = Math.min(30000, 1000 * Math.pow(2, retryCount - 1));
                    setBadge(`reconnecting… (${retryCount}/${MAX_RETRIES})`, 'bg-info');
                    retryTimer = setTimeout(connect, delay);
                };
            }

            connect();

            statusBadge.style.cursor = 'pointer';
            statusBadge.title = 'click to retry';
            statusBadge.addEventListener('click', function () {
                if (finished) return;
                retryCount = 0;
                setBadge('reconnecting…', 'bg-info');
                connect();
            });

            if (total === 0) {
                progressBar.style.width = '100%';
            }
        })();
    </script>
    <script src="https://kit.fontawesome.com/cc94f52acd.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
</body>

</html>
